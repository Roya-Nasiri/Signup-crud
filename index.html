<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign up</title>
    <link rel="stylesheet" href="./src/stylesheet/out.css" />
    <style>
      
      body {
        /* background: linear-gradient(
          135deg,
          #667eea 0%,
          #764ba2 100%
        ) !important; */
        background-color: #6177d9;
      }
      .box {
        background: rgba(255, 255, 255, 0.2) !important;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .out {
        display: none;
      }
      .log {
        display: none;
      }
      .remember {
        display: none;
      }
      .pop {
        z-index: 20;
        display: none;
        width: 25%;
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        padding: 20px;
        background-color: white;
        > input {
          display: block;
          width: 90%;
          height: 50px;
          margin: 10px;
        }
        > button {
          display: block;
          width: 30%;
          margin: 10px auto;
        }
      }
      table {
        border-collapse: collapse;
        margin: 40px auto;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        border-radius: 12px;
        overflow: hidden;
        direction: ltr;
        background-color: rgba(198, 181, 249, 0.587);
        display: flex;
      }
      tr {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      td {
        padding: 10px 60px;
        border: none;
        border-bottom: 1px solid #f0f0f0c1;
        font-size: 18px;
        color: #333;
        text-align: center;
        min-width: 150px;
      }
      td:first-child {
        border-left: none;
      }
      td img {
        width: 150px;
        height: 150px;
        border-radius: 10px;
        display: block;
        margin: 10px auto;
      }
      td:nth-last-child(2) {
        cursor: pointer;
        color: rgb(57, 13, 57);
        font-weight: 500;
        transition: background 0.2s;
      }
      td:nth-last-child(2):hover {
        font-weight: bold;
      }
      td:last-child {
        cursor: pointer;
        color: #e53935;
        font-weight: 500;
        transition: background 0.2s;
        border-bottom: none;
      }
      td:last-child:hover {
        font-weight: bold;
      }
      .confirm {
        cursor: pointer;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div
      id="overlay"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(30, 30, 30, 0.5);
        z-index: 10;
      "
    ></div>

    <div
      id="errorMsg"
      class="hidden text-red-500 text-sm text-center px-2 text-[18px] bg-white/20 backdrop-blur-lg py-2 rounded-lg fixed top-10 left-1/2 -translate-x-1/2 z-50"
    ></div>

    <!-- فرم -->
    <div
      class="box z-50 bg-white/20 backdrop-blur-xl rounded-2xl shadow-md w-full max-w-sm p-5 flex flex-col gap-y-2 relative"
    >
      <h2 class="text-2xl font-semibold text-purple-950 text-center py-3">
        Create Account
      </h2>
      <input
        type="text"
        placeholder="Email"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 text-white focus:ring-blue-200"
      />
      <input
        type="text"
        placeholder="Phone"
        class="w-full text-white border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"
      />
      <input
        type="password"
        placeholder="Password"
        class="w-full text-white border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"
      />
      <div class="remember flex items-center gap-2 text-sm">
        <input type="checkbox" id="a" class="accent-blue-500" />
        <label for="a" class="text-purple-950">Remember me</label>
      </div>
     
<button id="registerBtn" class="reg w-full bg-purple-950 hover:bg-indigo-900 text-white font-medium py-3 rounded-lg transition">Sign up</button>
      <button
        onclick="login()"
        class="log w-full border bg-purple-950 hover:bg-indigo-900 text-white font-medium py-3 rounded-lg transition"
      >
        Sign in
      </button>
      <h3
        class="confirm text-center text-sm text-purple-950 hover:underline cursor-pointer mt-2"
        onclick="openLogin()"
      >
        Already have an account? Sign in
      </h3>
      <h3
        class="confirmSignup hidden text-center text-sm text-purple-950 hover:underline cursor-pointer mt-2"
        onclick="openSignup()"
      >
        New here? Sign up
      </h3>
    </div>

    <!-- بعد از login اینا نشون داده میشن -->
    <div class="logout flex flex-col items-center gap-4 mt-6">
      <h3 class="text-lg font-medium text-white"></h3>
      <!-- جدول اینجا append میشه -->
      <button
        onclick="logout()"
        class="out bg-purple-400 hover:bg-red-500 cursor-pointer text-purple-950 font-medium py-2 px-6 rounded-lg transition"
      >
        Sign out
      </button>
    </div>

    <!-- pop ادیت -->
    <div class="pop rounded-xl p-6 flex flex-col gap-3">
      <input
        type="text"
        placeholder="New Email"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <input
        type="text"
        placeholder="New Phone"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <input
        type="text"
        placeholder="New Password"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <button
        id="saveBtn"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-3 rounded-lg transition"
      >
        Save
      </button>
    </div>
    
    <!-- /////////my pic//////// -->
<div class="myPic w-full max-w-[420px] rounded-[35px] bg-black/10 backdrop-blur-xl border border-white/20 shadow-2xl overflow-hidden flex sm:flex-row fixed bottom-1/12 left-1/2 -translate-x-1/2">
    <!-- Image -->
  
<div class="p-3 flex justify-center w-1/2">
    <img
      src="./src/img/my.jpg"
      class="w-[120px] h-[120px] object-cover rounded-full"
      alt=""
    />
  </div>
